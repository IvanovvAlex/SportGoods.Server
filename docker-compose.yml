services:
  db:
    image: postgres:16
    container_name: sportgoods-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "${DB_PORT}:5432"
    networks:
      - sportgoods-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  sportgoods-api:
    build:
      context: .
      dockerfile: SportGoods.Server.API/Dockerfile
    ports:
      - "${PORT}:${PORT}"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "http://*:${PORT}"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
    depends_on:
      - db
    networks:
      - sportgoods-network

networks:
  sportgoods-network:
    driver: bridge

volumes:
  postgres-data:
